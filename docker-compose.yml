# =============================================================================
# Spark — VPS production stack
#
# Brings up Postgres + Redis + scraper worker. The Next.js frontend lives on
# Vercel and reaches the worker via HTTPS through nginx (set up separately).
#
# Coexistence rules: Postgres + Redis are NOT exposed on host ports — they
# only live inside the docker network this compose creates (default name
# `spark_default`). Worker exposes a single port on the host (see SCRAPER_PORT,
# default 4001) — change it if 4001 collides with another service.
#
# Usage (on the VPS, after `git pull`):
#   cp .env.production.example .env.production
#   # edit .env.production with real secrets
#   docker compose -p spark --env-file .env.production up -d --build
#   docker compose -p spark logs -f scraper
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: spark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-spark}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bootstraps schema on first run only — re-running migrations afterwards
      # is the developer's responsibility (run psql against the live db).
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spark} -d ${POSTGRES_DB:-spark}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port mapping: worker reaches it via the internal docker network.
    # Avoids clashing with any Postgres already running on 5432.

  redis:
    image: redis:7-alpine
    container_name: spark-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: backend/scraper/Dockerfile
    container_name: spark-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      SCRAPER_SYNC: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-spark}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spark}
      REDIS_URL: redis://redis:6379
      SCRAPER_HMAC_SECRET: ${SCRAPER_HMAC_SECRET:?set SCRAPER_HMAC_SECRET}
      VYRAL_BASE_URL: https://www.vyral.com.br
      # Vyral creds are read by the auto-refresh path (when JWT expires).
      # The cookie file is what powers the live API today — keep it mounted.
      VYRAL_EMAIL: ${VYRAL_EMAIL:-}
      VYRAL_PASSWORD: ${VYRAL_PASSWORD:-}
      VYRAL_COOKIE_FILE: /app/data/vyral-cookies.json
      SESSION_FILE: /app/data/vyral-session.json
      JOB_TIMEOUT_MS: 120000
      RATE_LIMIT_PER_HOUR: 30
    volumes:
      # Persist the Vyral cookie store so we don't have to re-seed on every
      # container restart. Bind-mount from the VPS filesystem.
      - ./backend/scraper/data:/app/data
    ports:
      # Until we have nginx + TLS, expose worker on the VPS public IP.
      # HMAC + 5-min timestamp window protect against replay/forgery.
      # Change SCRAPER_PORT in .env.production if 4001 clashes with another app.
      - "${SCRAPER_PORT:-4001}:4001"

volumes:
  postgres_data:
    name: spark_postgres_data
  redis_data:
    name: spark_redis_data
