# =============================================================================
# Spark — VPS production stack
#
# Brings up Redis + scraper worker. Postgres now lives at Supabase (managed),
# reached via DATABASE_URL. The VPS keeps only what NEEDS local execution.
#
# Usage (on the VPS, after `git pull`):
#   cp .env.production.example .env.production
#   # edit .env.production — set SCRAPER_HMAC_SECRET and DATABASE_URL
#   docker compose -p spark --env-file .env.production up -d --build
#   docker compose -p spark logs -f scraper
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: spark-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: backend/scraper/Dockerfile
    container_name: spark-scraper
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      SCRAPER_SYNC: "false"
      # Supabase Postgres connection — must be set in .env.production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL (Supabase connection string)}
      REDIS_URL: redis://redis:6379
      SCRAPER_HMAC_SECRET: ${SCRAPER_HMAC_SECRET:?set SCRAPER_HMAC_SECRET}
      VYRAL_BASE_URL: https://app.vyral.com.br
      VYRAL_EMAIL: ${VYRAL_EMAIL:-}
      VYRAL_PASSWORD: ${VYRAL_PASSWORD:-}
      VYRAL_COOKIE_FILE: /app/data/vyral-cookies.json
      SESSION_FILE: /app/data/vyral-session.json
      JOB_TIMEOUT_MS: 120000
      RATE_LIMIT_PER_HOUR: 30
      # WhatsApp worker (Metodo TTS) — todas setadas em .env.production
      SUPABASE_URL: ${SUPABASE_URL:?set SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?set SUPABASE_SERVICE_ROLE_KEY}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:?set EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:?set EVOLUTION_API_KEY}
      # Lead blast — instancia Evolution DEDICADA (chip Finance isolado).
      # OPCIONAL: se nao setar, o endpoint /whatsapp/lead-blast retorna
      # erro ja na primeira tentativa de envio (sem afetar status do lead),
      # mas o demais do worker (motivacionais, triggers) continua funcionando.
      EVOLUTION_LEADS_URL: ${EVOLUTION_LEADS_URL:-}
      EVOLUTION_LEADS_API_KEY: ${EVOLUTION_LEADS_API_KEY:-}
      EVOLUTION_LEADS_INSTANCE: ${EVOLUTION_LEADS_INSTANCE:-Finance}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.metodotts.app}
      WHATSAPP_WORKER_ENABLED: ${WHATSAPP_WORKER_ENABLED:-true}
    volumes:
      - ./backend/scraper/data:/app/data
    ports:
      - "${SCRAPER_PORT:-4001}:4001"

volumes:
  redis_data:
    name: spark_redis_data
